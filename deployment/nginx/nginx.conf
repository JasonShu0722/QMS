# QMS 质量管理系统 - Nginx 双轨路由配置
# 支持 Preview（预览环境）与 Stable（正式环境）并行运行

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # 文件上传大小限制（支持大附件上传，如 8D 报告、PPAP 文件）
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # 上游服务器定义
    upstream backend-stable {
        server backend-stable:8000;
        keepalive 32;
    }

    upstream backend-preview {
        server backend-preview:8000;
        keepalive 32;
    }

    upstream frontend-stable {
        server frontend-stable:80;
        keepalive 32;
    }

    upstream frontend-preview {
        server frontend-preview:80;
        keepalive 32;
    }

    # 正式环境 (Stable) - qms.company.com
    server {
        listen 80;
        server_name qms.company.com;

        # HTTP 自动跳转 HTTPS（生产环境）
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name qms.company.com;

        # SSL 证书配置（生产环境）
        ssl_certificate /etc/nginx/ssl/qms.company.com.crt;
        ssl_certificate_key /etc/nginx/ssl/qms.company.com.key;

        # SSL 安全配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 后端 API 路由（正式环境）
        location /api {
            proxy_pass http://backend-stable;
            proxy_http_version 1.1;
            
            # 请求头转发
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # 超时配置（适应长时间运行的任务，如 AI 诊断）
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # WebSocket 支持（用于实时通知推送）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 前端静态资源路由（正式环境）
        location / {
            proxy_pass http://frontend-stable;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 静态文件缓存策略
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://frontend-stable;
                expires 7d;
                add_header Cache-Control "public, immutable";
            }
            
            # HTML 文件不缓存（确保用户始终获取最新版本）
            location ~* \.(html)$ {
                proxy_pass http://frontend-stable;
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            }
        }

        # 健康检查端点
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # 预览环境 (Preview) - preview.company.com
    server {
        listen 80;
        server_name preview.company.com;

        # HTTP 自动跳转 HTTPS（生产环境）
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name preview.company.com;

        # SSL 证书配置（生产环境）
        ssl_certificate /etc/nginx/ssl/preview.company.com.crt;
        ssl_certificate_key /etc/nginx/ssl/preview.company.com.key;

        # SSL 安全配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # 预览环境标识头（前端可据此显示"预览版"标识）
        add_header X-Environment "preview" always;

        # 后端 API 路由（预览环境）
        location /api {
            proxy_pass http://backend-preview;
            proxy_http_version 1.1;
            
            # 请求头转发
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # 超时配置
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # WebSocket 支持
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 前端静态资源路由（预览环境）
        location / {
            proxy_pass http://frontend-preview;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 预览环境静态文件缓存策略（较短缓存时间，便于快速验证新功能）
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://frontend-preview;
                expires 1d;
                add_header Cache-Control "public";
            }
            
            # HTML 文件不缓存
            location ~* \.(html)$ {
                proxy_pass http://frontend-preview;
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            }
        }

        # 健康检查端点
        location /health {
            access_log off;
            return 200 "healthy (preview)\n";
            add_header Content-Type text/plain;
        }
    }

    # 开发环境配置（可选，用于本地开发时的 HTTP 访问）
    server {
        listen 80;
        server_name localhost 127.0.0.1;

        # 文件上传大小限制
        client_max_body_size 50M;

        # 后端 API 路由（开发环境默认使用 stable）
        location /api {
            proxy_pass http://backend-stable;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # 前端路由（开发环境）
        location / {
            proxy_pass http://frontend-stable;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
